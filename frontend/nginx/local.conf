worker_processes 1;
daemon off;
pid runtime/nginx.pid;
error_log runtime/error.log warn;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log runtime/access.log;
    sendfile on;

    server {
        listen 127.0.0.1:17601;
        server_name localhost;
        root dist;
        index index.html;
        absolute_redirect off;

        error_page 404 /404.html;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location /assets/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location = / {
            return 302 /en;
        }

        location = /index.html {
            return 302 /en;
        }

        location = /robots.txt {
            try_files $uri =404;
        }

        location = /sitemap.xml {
            try_files $uri =404;
        }

        location = /404.html {
            internal;
        }

        location / {
            try_files $uri.html $uri/index.html =404;
        }
    }

    server {
        listen 127.0.0.1:17602;
        server_name localhost;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /magic-squares {
            return 301 https://magic-squares.mynka.tech/en$is_args$args;
        }

        location = /magic-squares/ {
            return 301 https://magic-squares.mynka.tech/en$is_args$args;
        }

        location ~ ^/magic-squares/(en|ru)(/.*)?$ {
            return 301 https://magic-squares.mynka.tech/$1$2$is_args$args;
        }

        location / {
            return 301 https://magic-squares.mynka.tech/en$is_args$args;
        }
    }
}
