# START_MODULE magic_squares_local_nginx
# START_CONTRACT
# PURPOSE: Serve the local and public-loopback frontend without retaining request-identifying data.
# OPERATIONAL_CONTEXT: User-level nginx behind the public reverse proxy on ports 17601 and 17602.
# CONTRACT: Do not write access logs or request-bearing error logs; serve only static frontend and redirects.
# KEYWORDS: nginx, privacy, static-spa, local-service
# COMPLEXITY: 2
# END_CONTRACT
worker_processes 1;
daemon off;
pid runtime/nginx.pid;
error_log /dev/null crit;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log off;
    sendfile on;

    server {
        listen 127.0.0.1:17601;
        server_name localhost;
        root dist;
        index index.html;
        absolute_redirect off;

        error_page 404 /404.html;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location /assets/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /social/ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=86400";
        }

        location ~ ^/(?:favicon(?:-32x32)?\.(?:svg|png|ico)|apple-touch-icon\.png)$ {
            try_files $uri =404;
            add_header Cache-Control "public, max-age=86400";
        }

        location = / {
            return 302 /en;
        }

        location = /index.html {
            return 302 /en;
        }

        location = /en/ {
            return 301 /en$is_args$args;
        }

        location = /ru/ {
            return 301 /ru$is_args$args;
        }

        location ~ ^/(en|ru)(/.+)/$ {
            return 301 /$1$2$is_args$args;
        }

        location = /robots.txt {
            try_files $uri =404;
        }

        location = /sitemap.xml {
            try_files $uri =404;
        }

        location = /404.html {
            internal;
        }

        location / {
            try_files $uri.html $uri/index.html =404;
        }
    }

    server {
        listen 127.0.0.1:17602;
        server_name localhost;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location = /magic-squares {
            return 301 https://magic-squares.mynka.tech/en$is_args$args;
        }

        location = /magic-squares/ {
            return 301 https://magic-squares.mynka.tech/en$is_args$args;
        }

        location ~ ^/magic-squares/(en|ru)(/.*)?$ {
            return 301 https://magic-squares.mynka.tech/$1$2$is_args$args;
        }

        location / {
            return 301 https://magic-squares.mynka.tech/en$is_args$args;
        }
    }
}
# END_MODULE magic_squares_local_nginx
