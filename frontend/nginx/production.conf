# START_MODULE magic_squares_production_nginx
# START_CONTRACT
# PURPOSE: Serve the production frontend without retaining request-identifying data.
# OPERATIONAL_CONTEXT: Standalone nginx server for the prerendered Magic Squares site.
# CONTRACT: Do not write access logs or request-bearing error logs; serve only static frontend content.
# KEYWORDS: nginx, privacy, production, static-site
# COMPLEXITY: 2
# END_CONTRACT
server {
    listen 80;
    listen [::]:80;
    server_name _;

    access_log off;
    error_log /dev/null crit;

    root /var/www/magic-squares;
    index index.html;
    absolute_redirect off;

    error_page 404 /404.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
        return 302 /en;
    }

    location = / {
        return 302 /en;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /404.html {
        internal;
    }

    location / {
        try_files $uri.html $uri/index.html =404;
    }
}
# END_MODULE magic_squares_production_nginx
